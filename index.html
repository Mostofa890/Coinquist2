    <style>

        /* ================== MINING CIRCLE ================== */

        .mystery-box-wrapper .box-label { margin-top: 12px; font-size: 16px; font-weight: 700; color: #fbbf24; }

        .mystery-box-wrapper .box-timer.cooldown { color: #fbbf24; }

        /* ================== NOTIFICATION BELL ================== */

        .notification-bell:hover { color: #fbbf24; }

        .notification-bell .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: 700; display: none; }

        /* ================== PAGES ================== */
        .page { display: none; min-height: 60vh; padding-top: 8px; }
        .page.active { display: block; }
        .page-header { font-size: 20px; font-weight: 800; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .task-filters { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }

        .withdraw-section .form-group { margin-bottom: 12px; }

        .withdraw-section .withdraw-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ================== XO GAME OVERLAY ================== */
        .xo-game-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .xo-game-overlay.show { display: flex; }

        .xo-game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .xo-game-header .game-info { color: #94a3b8; font-size: 12px; }
        .xo-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; max-width: 280px; margin-left: auto; margin-right: auto; }
        .xo-cell { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; cursor: pointer; transition: all 0.3s ease; color: #fff; }
        .xo-cell:hover { background: rgba(139,92,246,0.2); border-color: #8b5cf6; transform: scale(1.05); }

        .xo-cell.o-player { color: #ef4444; text-shadow: 0 0 15px rgba(239,68,68,0.5); }

        @keyframes winPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .xo-status { font-size: 16px; font-weight: 700; margin: 12px 0; min-height: 30px; }

        .xo-online-players { display: flex; justify-content: space-around; margin: 10px 0; gap: 10px; }

        /* ================== DICE GAME OVERLAY ================== */
        .dice-game-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }

        /* ================== COIN FLIP OVERLAY ================== */
        .coinflip-game-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }

    <script>
        // ... existing code ...

        // ============================================================
        // ================== DICE GAME SYSTEM =========================
        // ============================================================
        let diceGameData = { betAmount: 100, active: false };

        function openDiceGame() {
            if (!isOnline) { showToast('No internet!', 'error'); return; }
            document.getElementById('diceGameOverlay').classList.add('show');
            diceGameData.betAmount = 100;
            document.getElementById('diceBetAmount').value = 100;
            document.getElementById('diceDisplay').textContent = '🎲';
            document.getElementById('diceResult').textContent = '';
            document.getElementById('diceResult').className = 'dice-result';
            document.getElementById('diceRewardInfo').textContent = '';
        }

        function closeDiceGame() {
            document.getElementById('diceGameOverlay').classList.remove('show');
            diceGameData.active = false;
        }

        function setDiceBet(amount) {
            diceGameData.betAmount = Math.min(amount, 500, Math.floor(app.balance));
            document.getElementById('diceBetAmount').value = diceGameData.betAmount;
        }

        function playDiceGame(guess) {
            if (diceGameData.active) return;
            
            let bet = parseInt(document.getElementById('diceBetAmount').value) || 100;
            bet = Math.max(100, Math.min(bet, 500, Math.floor(app.balance)));
            
            if (bet < 100) { showToast('Minimum 100 coins!', 'error'); return; }
            
            // Check if user has enough coins, otherwise show ad
            if (app.balance < bet) {
                show_11197472().then(() => {
                    // Free play after ad
                    proceedDiceGame(guess, bet, true);
                }).catch(() => {
                    showToast('⚠️ Watch ad to play for free!', 'error');
                });
            } else {
                proceedDiceGame(guess, bet, false);
            }
        }

        function proceedDiceGame(guess, bet, isFree) {
            diceGameData.active = true;
            
            if (!isFree) {
                app.balance -= bet;
                userRef.update({ balance: app.balance });
                updateUI();
            }
            
            // Roll animation
            const diceEmojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            let rollCount = 0;
            const rollInterval = setInterval(() => {
                document.getElementById('diceDisplay').textContent = diceEmojis[Math.floor(Math.random() * 6)];
                rollCount++;
                if (rollCount >= 10) {
                    clearInterval(rollInterval);
                    const result = Math.floor(Math.random() * 6) + 1;
                    document.getElementById('diceDisplay').textContent = diceEmojis[result - 1];
                    
                    let win = false;
                    if (guess === 'low' && result <= 3) win = true;
                    if (guess === 'high' && result >= 4) win = true;
                    
                    let rewardCoins = 0;
                    let message = '';
                    
                    if (win) {
                        // Winner gets 10-20% profit based on bet
                        const profitPercent = 10 + Math.floor(Math.random() * 11); // 10-20%
                        rewardCoins = Math.floor(bet * (1 + profitPercent / 100));
                        message = `🎉 You win! (${profitPercent}% bonus)`;
                        document.getElementById('diceResult').className = 'dice-result win';
                    } else {
                        message = '😞 You lose!';
                        document.getElementById('diceResult').className = 'dice-result lose';
                        if (isFree) rewardCoins = 0;
                        else rewardCoins = 0; // Already deducted
                    }
                    
                    if (rewardCoins > 0) {
                        app.balance += rewardCoins;
                        app.xpPoints += rewardCoins * 2;
                    }
                    
                    document.getElementById('diceResult').textContent = message;
                    document.getElementById('diceRewardInfo').textContent = rewardCoins > 0 ? `+${rewardCoins} Coins` : '';
                    
                    userRef.update({ balance: app.balance, xpPoints: app.xpPoints });
                    updateUI(); updateLevelUI();
                    diceGameData.active = false;
                    
                    if (rewardCoins > 0) showToast(`${message} +${rewardCoins} Coins!`);
                }
            }, 100);
        }

        // ============================================================

        }

        function closeCoinFlipGame() {
            document.getElementById('coinflipGameOverlay').classList.remove('show');
            coinFlipData.active = false;
        }

        function setCoinFlipBet(amount) {
            coinFlipData.betAmount = Math.min(amount, 500, Math.floor(app.balance));
            document.getElementById('coinflipBetAmount').value = coinFlipData.betAmount;
        }

        function playCoinFlipGame(guess) {
            if (coinFlipData.active) return;
            
            let bet = parseInt(document.getElementById('coinflipBetAmount').value) || 100;
            bet = Math.max(100, Math.min(bet, 500, Math.floor(app.balance)));
            
            if (bet < 100) { showToast('Minimum 100 coins!', 'error'); return; }
            
            if (app.balance < bet) {
                show_11197472().then(() => {
                    proceedCoinFlipGame(guess, bet, true);
                }).catch(() => {
                    showToast('⚠️ Watch ad to play for free!', 'error');
                });
            } else {
                proceedCoinFlipGame(guess, bet, false);
            }
        }

        function proceedCoinFlipGame(guess, bet, isFree) {
            coinFlipData.active = true;
            
            if (!isFree) {
                app.balance -= bet;
                userRef.update({ balance: app.balance });
                updateUI();
            }
            
            // Flip animation
            document.getElementById('coinflipDisplay').style.animation = 'none';
            document.getElementById('coinflipDisplay').offsetHeight;
            document.getElementById('coinflipDisplay').style.animation = 'coinFlipAnim 1s ease';
            
            setTimeout(() => {
                const result = Math.random() > 0.5 ? 'heads' : 'tails';
                document.getElementById('coinflipDisplay').textContent = result === 'heads' ? '👤' : '🦅';
                
                const win = guess === result;
                let rewardCoins = 0;
                let message = '';
                
                if (win) {
                    const profitPercent = 10 + Math.floor(Math.random() * 11);
                    rewardCoins = Math.floor(bet * (1 + profitPercent / 100));
                    message = `🎉 You win! (${profitPercent}% bonus) - ${result}`;
                    document.getElementById('coinflipResult').className = 'coinflip-result win';
                } else {
                    message = `😞 You lose! - ${result}`;
                    document.getElementById('coinflipResult').className = 'coinflip-result lose';
                }
                
                if (rewardCoins > 0) {
                    app.balance += rewardCoins;
                    app.xpPoints += rewardCoins * 2;
                }
                
                document.getElementById('coinflipResult').textContent = message;
                document.getElementById('coinflipRewardInfo').textContent = rewardCoins > 0 ? `+${rewardCoins} Coins` : '';
                
                userRef.update({ balance: app.balance, xpPoints: app.xpPoints });
                updateUI(); updateLevelUI();
                coinFlipData.active = false;
                
                if (rewardCoins > 0) showToast(`${message} +${rewardCoins} Coins!`);
            }, 1000);
        }

        // ============================================================
        // ================== UPDATED XO GAME (with ad support) =======
        // ============================================================
        function openXOGame() {
            if (!isOnline) { showToast('No internet!', 'error'); return; }
            document.getElementById('xoGameOverlay').classList.add('show');
            document.getElementById('xoModeSelection').style.display = 'block';
            document.getElementById('xoBetSection').style.display = 'none';
            document.getElementById('xoOnlineInfo').style.display = 'none';
            document.getElementById('xoGameBoard').style.display = 'none';
            resetXOGame();
        }

        // Updated confirmXOGame with ad support
        function confirmXOGame() {
            let bet = parseInt(document.getElementById('xoBetAmount').value) || 100;
            bet = Math.max(100, Math.min(bet, 500, Math.floor(app.balance)));
            
            if (bet < 100) { showToast('Minimum 100 coins!', 'error'); return; }
            
            if (app.balance < bet) {
                // Show ad for free play
                show_11197472().then(() => {
                    proceedXOGame(bet, true);
                }).catch(() => {
                    showToast('⚠️ Watch ad to play for free!', 'error');
                });
            } else {
                proceedXOGame(bet, false);
            }
        }

        function proceedXOGame(bet, isFree) {
            xoGameData.betAmount = bet;
            
            if (!isFree) {
                app.balance -= bet;
                userRef.update({ balance: app.balance });
                updateUI();
            }
            
            if (xoGameData.mode === 'computer') initComputerGame();
            else initOnlineGame();
        }

        // Updated handleGameEnd with percentage-based rewards
        function handleGameEnd(result) {
            if (xoGameData.rewardGiven) return;
            xoGameData.rewardGiven = true;
            xoGameData.gameActive = false; xoGameData.gameOver = true; xoGameData.winner = result;
            
            let rewardCoins = 0, message = '';
            const profitPercent = 10 + Math.floor(Math.random() * 11); // 10-20%
            
            if (result === 'draw') {
                message = '🤝 It\'s a draw!';
                document.getElementById('xoStatus').className = 'xo-status draw';
                rewardCoins = xoGameData.betAmount; // Refund
                app.balance += rewardCoins;
            } else if (result === xoGameData.mySymbol) {
                message = `🎉 You win! (${profitPercent}% bonus)`;
                document.getElementById('xoStatus').className = 'xo-status win';
                rewardCoins = Math.floor(xoGameData.betAmount * (1 + profitPercent / 100));
                app.balance += rewardCoins;
                app.xpPoints += rewardCoins * 2;
            } else {
                message = '😞 You lose!';
                document.getElementById('xoStatus').className = 'xo-status lose';
                rewardCoins = 0;
            }
            
            document.getElementById('xoStatus').textContent = message;
            document.getElementById('xoRewardInfo').textContent = rewardCoins > 0 ? `+${rewardCoins} Coins (${profitPercent}%)` : `-${xoGameData.betAmount} Coins`;
            document.getElementById('xoRestartBtn').style.display = 'block';
            
            userRef.update({ balance: app.balance, xpPoints: app.xpPoints });
            updateUI(); updateLevelUI(); renderXOBoard();
            if (rewardCoins > 0) showToast(`${message} +${rewardCoins} Coins!`);
        }

        // ============================================================
        // ================== FIXED MINING (floating coins restored) ===
        // ============================================================
        function startMining() {
            if (!isOnline) { showToast('No internet!', 'error'); return; }
            if (miningInterval) return;
            if (app.progressCoins <= 0) { showToast('❌ No coins!', 'error'); updateProgressUI(); return; }
            document.getElementById('circleStartOverlay').classList.add('hidden');
            userRef.update({ isCurrentlyMining: true, lastMiningActivity: Date.now() });
            wasMiningBeforeOffline = true;
            
            function mineNextCoin() {
                if (!isOnline) { stopMining(); showToast('⚠️ Network lost!', 'error'); return; }
                if (isAdShowing) { setTimeout(mineNextCoin, 1000); return; }
                if (app.progressCoins <= 0) { stopMining(); showToast('🎉 Coins finished!', 'success'); updateProgressUI(); return; }
                const d = calculateLevel(app.xpPoints);
                let speedMultiplier = 1 + (d.bonusPercent / 100);
                
                app.progressCoins -= 1;
                app.balance += speedMultiplier;
                app.xpPoints += 1;
                
                userRef.transaction((cd) => cd ? { ...cd, balance: (cd.balance||0)+speedMultiplier, progressCoins: Math.max(0,(cd.progressCoins||0)-1), xpPoints: (cd.xpPoints||0)+1, lastMiningActivity: Date.now() } : null);
                
                // ✅ FLOATING COIN ANIMATION
                const coin = document.createElement('div');
                coin.className = 'floating-coin';
                coin.textContent = `+${speedMultiplier.toFixed(0)} 🪙`;
                coin.style.left = (Math.random() * 80 + 10) + '%';
                coin.style.top = '35%';
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 1000);
                
                updateProgressUI(); updateUI(); updateLevelUI();
                miningInterval = setTimeout(mineNextCoin, 5000 / speedMultiplier);
            }
            mineNextCoin();
            updateProgressUI();
            showToast('⛏️ Mining!');
        }

        // ============================================================
        // ================== FIXED SPIN WHEEL (USD to USD balance) ===
        // ============================================================
        function spinWheelFromModal() {
            if (!isOnline) { showToast('No internet!', 'error'); return; }
            if (isSpinning) return;
            if (spinCount <= 0) { showToast('🎯 No spins left!', 'error'); return; }
            const btn = document.getElementById('modalSpinBtn');
            btn.disabled = true; isSpinning = true;
            document.getElementById('modalSpinResult').textContent = '';
            
            let cooldown = SPIN_BUTTON_COOLDOWN_SECONDS;
            document.getElementById('modalSpinTimerBox').classList.add('show');
            document.getElementById('modalSpinTimerDisplay').textContent = `00:${String(cooldown).padStart(2, '0')}`;
            if (spinBtnCooldownInterval) clearInterval(spinBtnCooldownInterval);
            spinBtnCooldownInterval = setInterval(() => {
                cooldown--;
                if (cooldown > 0) document.getElementById('modalSpinTimerDisplay').textContent = `00:${String(cooldown).padStart(2, '0')}`;
                else { clearInterval(spinBtnCooldownInterval); spinBtnCooldownInterval = null; document.getElementById('modalSpinTimerBox').classList.remove('show'); btn.disabled = false; }
            }, 1000);
            
            const randomSpins = 5 + Math.floor(Math.random() * 5);
            const randomAngle = Math.floor(Math.random() * 360);
            currentRotation += randomSpins * 360 + randomAngle;
            document.getElementById('wheelSegments').style.transform = `rotate(${currentRotation}deg)`;

            show_11197472().then(() => {
                isAdShowing = false;
                const prize = getPrizeByAngle(currentRotation);
                let rewardCoins = 0, rewardUsd = 0;
                
                if (prize.type === 'coins') {
                    rewardCoins = prize.value;
                    app.balance += rewardCoins; // ✅ Goes to COIN balance
                } else if (prize.type === 'usd') {
                    rewardUsd = prize.value;
                    app.usdBalance += rewardUsd; // ✅ Goes to USD balance
                }
                
                spinCount--;
                document.getElementById('spinBadge').textContent = spinCount;
                document.getElementById('modalSpinResult').textContent = `🎉 You won ${prize.label}!`;
                updateSpinModalUI();
                
                let resultText = '';
                if (rewardCoins > 0) resultText += `+${rewardCoins} Coins!`;
                if (rewardUsd > 0) resultText += `+$${rewardUsd.toFixed(4)} USD!`;
                if (resultText === '') resultText = 'Better luck next time!';
                
                document.getElementById('rewardText').textContent = resultText;
                document.getElementById('successModal').classList.add('active');
                userRef.update({ balance: app.balance, usdBalance: app.usdBalance, spinCount: spinCount });
                updateUI(); updateProgressUI(); updateLevelUI();
                isSpinning = false;
                showToast(`🎰 Spin result: ${prize.label}`);
                
                // ✅ FLOATING COIN ANIMATION for spin
                if (rewardCoins > 0) {
                    const coin = document.createElement('div');
                    coin.className = 'floating-coin';
                    coin.textContent = `+${rewardCoins} 🪙`;
                    coin.style.left = (Math.random() * 80 + 10) + '%';
                    coin.style.top = '35%';
                    coin.style.fontSize = '35px';
                    document.body.appendChild(coin);
                    setTimeout(() => coin.remove(), 1200);
                }
            }).catch(() => {
                isAdShowing = false; btn.disabled = false; isSpinning = false;
                document.getElementById('modalSpinResult').textContent = '⚠️ Ad not watched! Try again.';
                showToast('⚠️ Please watch the ad to get reward!', 'error');
            });
        }

        // ============================================================
        // ================== NOTIFICATION BELL (opens overlay) =======
        // ============================================================
        function openNotificationPanel() {
            document.getElementById('notificationOverlay').classList.add('show');
            loadNotifications();
        }

        function closeNotificationPanel() {
            document.getElementById('notificationOverlay').classList.remove('show');
        }

        function loadNotifications() {
            const container = document.getElementById('notificationList');
            // Load from Firebase notifications node where recipient is 'all' or matches userId
            db.ref('notifications').orderByChild('createdAt').limitToLast(30).once('value', snap => {
                const notifs = snap.val() || {};
                const notifArray = Object.values(notifs).filter(n => 
                    n.recipient === 'all' || n.recipientUserId === userId
                ).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                
                if (!notifArray.length) {
                    container.innerHTML = '<p style="color:#94a3b8;text-align:center;">No notifications yet</p>';
                    document.getElementById('notifBadge').style.display = 'none';
                    return;
                }
                
                // Count unread
                const unreadCount = notifArray.filter(n => !n.read).length;
                const badge = document.getElementById('notifBadge');
                if (unreadCount > 0) {
                    badge.style.display = 'block';
                    badge.textContent = unreadCount;
                } else {
                    badge.style.display = 'none';
                }
                
                container.innerHTML = notifArray.map(n => {
                    const date = n.createdAt ? new Date(n.createdAt).toLocaleString() : '';
                    const typeClass = n.type === 'success' ? 'badge-success' :
                                     n.type === 'warning' ? 'badge-warning' :
                                     n.type === 'error' ? 'badge-danger' : 'badge-info';
                    return `<div class="notification-item" style="${!n.read ? 'border-left: 3px solid #fbbf24;' : ''}">
                        <div class="notif-title">
                            <span class="badge ${typeClass}" style="margin-right:6px;">${n.type || 'info'}</span>
                            ${n.title || 'Notification'}
                        </div>
                        <div class="notif-message">${n.message || ''}</div>
                        <div class="notif-time">${date}</div>
                    </div>`;
                }).join('');
            });
        }

        // ============================================================
        // ================== LEVEL PROGRESS BAR (in header) ==========
        // ============================================================
        function updateLevelUI() {
            const d = calculateLevel(app.xpPoints);
            const levelSection = document.querySelector('.level-section');
            
            if (!levelSection.querySelector('.level-row')) {
                levelSection.innerHTML = `
                    <div class="level-row">
                        <span class="level-title" id="levelTitle">🔒 Unlocking</span>
                        <span class="level-number" id="levelNumber">Level 0</span>
                    </div>
                    <div class="level-progress" style="margin-top:8px;">
                        <div class="fill" id="levelProgressFill" style="width:0%;"></div>
                    </div>
                    <div style="font-size:9px;color:#94a3b8;display:flex;justify-content:space-between;margin-top:4px;">
                        <span id="levelCurrentPoints">-5000 XP</span>
                        <span id="levelNextPoints">/ 5000 XP</span>
                    </div>
                `;
            }
            
            if (d.level === 0) {
                document.getElementById('levelTitle').textContent = '🔒 Unlocking';
                document.getElementById('levelNumber').textContent = 'Level 0';
                document.getElementById('levelProgressFill').style.width = d.progress + '%';
                document.getElementById('levelCurrentPoints').textContent = `${d.xp} XP`;
                document.getElementById('levelNextPoints').textContent = `/ ${d.xpForLevel} XP`;
                document.getElementById('userLevelBadge').textContent = '🔒 Unlocking';
            } else {
                document.getElementById('levelTitle').textContent = `${d.tierEmoji} ${d.tierName}`;
                document.getElementById('levelNumber').textContent = `Level ${d.level}`;
                document.getElementById('levelProgressFill').style.width = d.progress + '%';
                document.getElementById('levelCurrentPoints').textContent = `${d.xp} XP`;
                document.getElementById('levelNextPoints').textContent = d.isMaxLevel ? '⭐ MAX' : `/ ${d.xpForLevel} XP`;
                document.getElementById('userLevelBadge').textContent = `${d.tierEmoji} Lv.${d.level}`;
            }
        }

        // ... rest of the code remains the same ...
    </script>
