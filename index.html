<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐹 Hamster Kombat Clone</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tap-btn { transition: transform 0.1s; }
        .tap-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen bg-gray-900 text-white p-4">
        <!-- নেভিগেশন বার -->
        <nav class="flex justify-around bg-gray-800 p-3 rounded-xl mb-4 fixed bottom-0 left-0 right-0 z-10 border-t border-gray-700">
            <button onclick="showPage('home')" class="flex flex-col items-center text-yellow-400">
                <span class="text-2xl">🏠</span>
                <span class="text-xs">হোম</span>
            </button>
            <button onclick="showPage('wallet')" class="flex flex-col items-center text-gray-400">
                <span class="text-2xl">💰</span>
                <span class="text-xs">ওয়ালেট</span>
            </button>
            <button onclick="showPage('history')" class="flex flex-col items-center text-gray-400">
                <span class="text-2xl">📜</span>
                <span class="text-xs">হিস্ট্রি</span>
            </button>
        </nav>

        <!-- পেজ কন্টেইনার -->
        <div id="page-container" class="pb-20">
            <!-- হোম পেজ -->
            <div id="home" class="page">
                <div class="text-center mt-4">
                    <h1 class="text-4xl font-bold">🐹 Hamster Kombat</h1>
                    <p class="text-gray-400 mt-1">ট্যাপ করে কয়েন সংগ্রহ করুন!</p>
                </div>

                <div class="mt-8 text-center">
                    <div class="text-6xl font-bold text-yellow-400" id="coinDisplay">0</div>
                    <div class="text-sm text-gray-400 mt-1">🪙 কয়েন</div>
                </div>

                <div class="mt-4 text-center">
                    <div class="text-xl" id="energyDisplay">⚡ 100/100</div>
                    <div class="w-64 mx-auto bg-gray-700 h-2 rounded-full mt-1">
                        <div id="energyBar" class="bg-yellow-400 h-2 rounded-full" style="width:100%"></div>
                    </div>
                </div>

                <div class="mt-8 flex justify-center">
                    <button id="tapBtn" onclick="handleTap()" class="tap-btn bg-yellow-500 hover:bg-yellow-600 text-gray-900 text-2xl px-12 py-6 rounded-full shadow-lg font-bold">
                        👆 TAP
                    </button>
                </div>

                <div class="mt-6 text-center text-sm text-gray-500">
                    <p>রিফারাল: <span id="referralCount">0</span> | লেভেল: <span id="level">1</span></p>
                </div>
            </div>

            <!-- ওয়ালেট পেজ -->
            <div id="wallet" class="page hidden">
                <h2 class="text-2xl font-bold">💰 ওয়ালেট</h2>
                <div class="mt-4 bg-gray-800 p-4 rounded-xl">
                    <p class="text-gray-400">হ্যামস্টার কয়েন</p>
                    <p class="text-3xl font-bold text-yellow-400" id="walletCoins">0</p>
                </div>
                <div class="mt-4 bg-gray-800 p-4 rounded-xl">
                    <p class="text-gray-400">টাকা (USD)</p>
                    <p class="text-3xl font-bold text-green-400" id="walletUsd">$0.00</p>
                </div>
                <button onclick="withdraw()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl w-full">
                    💸 উইথড্র করুন
                </button>
            </div>

            <!-- হিস্ট্রি পেজ -->
            <div id="history" class="page hidden">
                <h2 class="text-2xl font-bold">📜 হিস্ট্রি</h2>
                <div id="historyList" class="mt-4 space-y-2">
                    <!-- ডায়নামিক্যালি লোড হবে -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // ১. FIREBASE কনফিগারেশন (আপনার JSON থেকে নেওয়া)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAqCNHhu9oaBDea85tAH-iHucHczZnR7nY",
            authDomain: "tolaka-exc-reverb-b1afd.firebaseapp.com",
            databaseURL: "https://tolaka-exc-reverb-b1afd-default-rtdb.firebaseio.com",
            projectId: "tolaka-exc-reverb-b1afd",
            storageBucket: "tolaka-exc-reverb-b1afd.appspot.com",
            messagingSenderId: "25114300036",
            appId: "1:25114300036:android:579e5c869a075113603cd1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================================
        // ২. টেলিগ্রাম অটো লগইন + ইউজার আইডি
        // ============================================================
        let userId = "demo_user_123"; // ডিফল্ট

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            if (user) {
                userId = String(user.id);
                console.log("✅ Telegram user:", userId);
            } else {
                console.warn("⚠️ Telegram user not found, using demo ID");
            }
        } else {
            console.warn("⚠️ Not in Telegram WebApp, using demo ID");
        }

        // ============================================================
        // ৩. গ্লোবাল ভেরিয়েবল
        // ============================================================
        let coins = 0;
        let energy = 100;
        let maxEnergy = 100;
        let level = 1;
        let referralCount = 0;
        let history = [];

        // ============================================================
        // ৪. ফায়ারবেস থেকে ডেটা লোড
        // ============================================================
        async function loadUserData() {
            try {
                const docRef = db.collection('users').doc(userId);
                const docSnap = await docRef.get();

                if (docSnap.exists) {
                    const data = docSnap.data();
                    coins = data.coins || 0;
                    energy = data.energy || 100;
                    level = data.level || 1;
                    referralCount = data.referralCount || 0;
                    history = data.history || [];
                } else {
                    // নতুন ইউজার - ডিফল্ট ডেটা সেট
                    await docRef.set({
                        coins: 0,
                        energy: 100,
                        level: 1,
                        referralCount: 0,
                        history: [],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                updateUI();
            } catch (error) {
                console.error("Firebase error:", error);
            }
        }

        // ============================================================
        // ৫. ফায়ারবেসে ডেটা সেভ
        // ============================================================
        async function saveUserData() {
            try {
                const docRef = db.collection('users').doc(userId);
                await docRef.update({
                    coins: coins,
                    energy: energy,
                    level: level,
                    referralCount: referralCount,
                    history: history
                });
            } catch (error) {
                console.error("Save error:", error);
            }
        }

        // ============================================================
        // ৬. UI আপডেট ফাংশন
        // ============================================================
        function updateUI() {
            document.getElementById('coinDisplay').textContent = coins;
            document.getElementById('walletCoins').textContent = coins;
            document.getElementById('walletUsd').textContent = `$${(coins * 0.001).toFixed(2)}`;
            document.getElementById('energyDisplay').textContent = `⚡ ${energy}/${maxEnergy}`;
            document.getElementById('energyBar').style.width = `${(energy / maxEnergy) * 100}%`;
            document.getElementById('level').textContent = level;
            document.getElementById('referralCount').textContent = referralCount;
            
            // হিস্ট্রি রেন্ডার
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-gray-500 text-center">কোনো লেনদেন নেই</p>';
            } else {
                history.slice().reverse().forEach(h => {
                    const div = document.createElement('div');
                    div.className = 'bg-gray-800 p-3 rounded-xl flex justify-between items-center';
                    div.innerHTML = `
                        <span>${h.action}</span>
                        <span class="${h.amount > 0 ? 'text-green-400' : 'text-red-400'}">${h.amount > 0 ? '+' : ''}${h.amount}</span>
                        <span class="text-gray-500 text-xs">${h.date || 'আজ'}</span>
                    `;
                    historyList.appendChild(div);
                });
            }
        }

        // ============================================================
        // ৭. ট্যাপ হ্যান্ডলার
        // ============================================================
        async function handleTap() {
            if (energy <= 0) {
                // এনার্জি রিচার্জ (১০ সেকেন্ডে ১)
                alert("⚡ এনার্জি শেষ! ১০ সেকেন্ডে ১ রিচার্জ হবে।");
                return;
            }

            // ট্যাপ করুন
            coins += 1;
            energy -= 1;

            // লেভেল আপ (প্রতি ১০০ কয়েনে)
            const newLevel = Math.floor(coins / 100) + 1;
            if (newLevel > level) {
                level = newLevel;
                history.push({ action: `লেভেল ${level}`, amount: 0, date: new Date().toLocaleDateString() });
            }

            // হিস্ট্রি যোগ
            history.push({ action: 'ট্যাপ', amount: 1, date: new Date().toLocaleTimeString() });

            // UI আপডেট
            updateUI();

            // ফায়ারবেসে সেভ (throttled)
            await saveUserData();
        }

        // ============================================================
        // ৮. এনার্জি রিচার্জ (প্রতি ১০ সেকেন্ডে +১)
        // ============================================================
        setInterval(async () => {
            if (energy < maxEnergy) {
                energy += 1;
                updateUI();
                await saveUserData();
            }
        }, 10000);

        // ============================================================
        // ৯. পেজ পরিবর্তন ফাংশন
        // ============================================================
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
            document.getElementById(pageName).classList.remove('hidden');
            
            // নেভিগেশন হাইলাইট
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('text-yellow-400');
                btn.classList.add('text-gray-400');
            });
            // হোমের জন্য আলাদা
            if (pageName === 'home') {
                document.querySelector('nav button:first-child').classList.remove('text-gray-400');
                document.querySelector('nav button:first-child').classList.add('text-yellow-400');
            }
        }

        // ============================================================
        // ১০. উইথড্র ফাংশন (ডেমো)
        // ============================================================
        function withdraw() {
            if (coins < 100) {
                alert("উইথড্র করতে কমপক্ষে ১০০ কয়েন লাগবে!");
                return;
            }
            const amount = prompt("কত কয়েন উইথড্র করবেন? (১০০ এর বেশি)");
            if (amount && !isNaN(amount) && amount >= 100 && amount <= coins) {
                coins -= parseInt(amount);
                history.push({ action: 'উইথড্র', amount: -parseInt(amount), date: new Date().toLocaleTimeString() });
                updateUI();
                saveUserData();
                alert(`✅ ${amount} কয়েন উইথড্র করা হয়েছে!`);
            }
        }

        // ============================================================
        // ১১. অ্যাপ লোড হওয়ার সময়
        // ============================================================
        window.onload = async function() {
            await loadUserData();
            // ডিফল্ট পেজ হোম
            showPage('home');
            console.log('🚀 Hamster Kombat ready!');
        };

        // ============================================================
        // ১২. লগইন (Telegram auto-login handled above)
        // ============================================================
        // Firebase Auth এর সাথে সংযুক্ত করতে চাইলে:
        // auth.signInAnonymously().catch(console.error);
        // কিন্তু Telegram auto-login এর জন্য ব্যাকএন্ড লাগবে।
        // ডেমোতে আমরা সরাসরি Firebase Firestore ব্যবহার করছি।
    </script>

</body>
</html>
